<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NewAraFEC">
<title>NewAraFEC</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Roboto+Condensed:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --sky-top:#9ed4f0;--sky-mid:#bde4f5;--sky-bot:#e2f4fd;
  --glass-bg:rgba(255,255,255,0.38);--glass-bg2:rgba(255,255,255,0.55);--glass-bdr:rgba(255,255,255,0.78);
  --text-dark:#1a3a4a;--text-mid:#2e6080;--text-light:#5b9ab8;
  --topbar-h:54px;
}

html,body{height:100%;overscroll-behavior:none;}
body{
  font-family:'Nunito',sans-serif;
  min-height:100dvh;display:flex;flex-direction:column;
  background:
    radial-gradient(ellipse at 15% 0%,rgba(160,220,255,0.75) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 5%,rgba(180,235,255,0.55) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 100%,rgba(100,195,240,0.45) 0%,transparent 60%),
    linear-gradient(175deg,var(--sky-top) 0%,var(--sky-mid) 40%,var(--sky-bot) 100%);
  background-attachment:fixed;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
  overflow:hidden;position:relative;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
body::before{width:360px;height:360px;top:-90px;right:-90px;background:radial-gradient(circle,rgba(160,225,255,0.6) 0%,transparent 70%);}
body::after {width:300px;height:300px;bottom:-70px;left:-70px;background:radial-gradient(circle,rgba(130,205,250,0.5) 0%,transparent 70%);}

.bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.7),rgba(170,225,255,0.1));border:1px solid rgba(255,255,255,0.6);animation:floatUp linear infinite;}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:0;}10%{opacity:1;}90%{opacity:.5;}100%{transform:translateY(-110vh) scale(1.1);opacity:0;}}

/* ══ TOPBAR ══ */
.topbar{position:relative;z-index:100;flex-shrink:0;height:var(--topbar-h);display:flex;align-items:center;padding:0 14px;gap:10px;background:rgba(255,255,255,0.35);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.75);box-shadow:0 2px 16px rgba(80,170,220,0.15),0 1px 0 rgba(255,255,255,0.9) inset;}
.topbar::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.45),transparent);pointer-events:none;}
.newara-logo{font-family:'Roboto Condensed',sans-serif;font-weight:500;font-size:21px;flex-shrink:0;color:var(--text-dark);letter-spacing:0.5px;text-shadow:0 1px 2px rgba(255,255,255,0.9),0 2px 8px rgba(80,160,210,0.2);position:relative;z-index:1;cursor:pointer;padding:4px 8px;border-radius:10px;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none;}
.newara-logo:hover{background:rgba(255,255,255,0.4);}
.newara-logo:active{transform:scale(.95);}
.newara-logo span{background:linear-gradient(135deg,#c0392b,#8e44ad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar-divider{width:1px;height:26px;background:rgba(255,255,255,0.6);border-left:1px solid rgba(80,160,200,0.2);flex-shrink:0;position:relative;z-index:1;}
.topbar-pages{display:flex;gap:6px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:relative;z-index:1;}
.topbar-pages::-webkit-scrollbar{display:none;}
.page-btn{padding:7px 14px;border-radius:50px;border:none;font-size:12.5px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;white-space:nowrap;flex-shrink:0;position:relative;overflow:hidden;opacity:.42;background:rgba(255,255,255,0.45);color:var(--text-mid);border:1px solid rgba(255,255,255,0.7);box-shadow:0 2px 6px rgba(80,160,210,0.1),0 1px 0 rgba(255,255,255,0.8) inset;}
.page-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:52%;background:linear-gradient(to bottom,rgba(255,255,255,0.5),rgba(255,255,255,0.1));border-radius:50px 50px 0 0;pointer-events:none;}
.page-btn.active{opacity:1;transform:translateY(-1px);color:#fff;border-color:rgba(255,255,255,0.4);}
.page-btn:active{transform:scale(.95);}
.pb-lib.active {background:linear-gradient(150deg,#e74c3c,#c0392b);box-shadow:0 4px 14px rgba(192,57,43,0.45),0 1px 0 rgba(255,255,255,0.35) inset;text-shadow:0 1px 2px rgba(0,0,0,0.2);}
.pb-nor.active {background:linear-gradient(150deg,#9b59b6,#8e44ad);box-shadow:0 4px 14px rgba(142,68,173,0.45),0 1px 0 rgba(255,255,255,0.35) inset;text-shadow:0 1px 2px rgba(0,0,0,0.2);}
.pb-ref.active {background:linear-gradient(150deg,#5ba3e8,#2a72cc);box-shadow:0 4px 14px rgba(42,114,204,0.45),0 1px 0 rgba(255,255,255,0.35) inset;text-shadow:0 1px 2px rgba(0,0,0,0.2);}
.pb-ex.active  {background:linear-gradient(150deg,#3dcb96,#0a8f60);box-shadow:0 4px 14px rgba(10,143,96,0.45),0 1px 0 rgba(255,255,255,0.35) inset;text-shadow:0 1px 2px rgba(0,0,0,0.2);}

/* ══ MENU ══ */
.menu-overlay{position:fixed;inset:0;z-index:200;display:none;align-items:flex-start;justify-content:flex-start;padding-top:calc(var(--topbar-h) + 8px);padding-left:14px;background:rgba(160,210,240,0.18);backdrop-filter:blur(6px);animation:menuFadeIn .18s ease;}
.menu-overlay.open{display:flex;}
@keyframes menuFadeIn{from{opacity:0;}to{opacity:1;}}
.menu-panel{background:rgba(255,255,255,0.72);border:1px solid rgba(255,255,255,0.9);border-radius:20px;padding:10px;min-width:220px;backdrop-filter:blur(24px);box-shadow:0 12px 40px rgba(60,140,210,0.22),0 1.5px 0 rgba(255,255,255,0.95) inset;position:relative;overflow:hidden;animation:menuSlideIn .2s cubic-bezier(.34,1.56,.64,1);}
@keyframes menuSlideIn{from{opacity:0;transform:translateY(-8px) scale(.97);}to{opacity:1;transform:none;}}
.menu-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(to bottom,rgba(255,255,255,0.55),transparent);pointer-events:none;border-radius:20px 20px 0 0;}
.menu-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-light);padding:4px 10px 8px;}
.menu-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 12px;border-radius:13px;border:none;background:transparent;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;-webkit-tap-highlight-color:transparent;position:relative;z-index:1;}
.menu-item:hover{background:rgba(255,255,255,0.6);}
.menu-item:active{transform:scale(.97);}
.menu-item-icon{width:36px;height:36px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid rgba(255,255,255,0.6);box-shadow:0 2px 6px rgba(0,0,0,0.1),0 1px 0 rgba(255,255,255,0.8) inset;position:relative;overflow:hidden;}
.menu-item-icon::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.5),transparent);border-radius:11px 11px 0 0;}
.menu-item-label{font-size:14px;font-weight:800;color:var(--text-dark);display:block;}
.menu-item-sub  {font-size:11px;font-weight:600;color:var(--text-light);display:block;}
.mi-lib .menu-item-icon{background:linear-gradient(135deg,#e74c3c,#c0392b);box-shadow:0 3px 10px rgba(192,57,43,0.35),0 1px 0 rgba(255,255,255,0.4) inset;}
.mi-nor .menu-item-icon{background:linear-gradient(135deg,#9b59b6,#8e44ad);box-shadow:0 3px 10px rgba(142,68,173,0.35),0 1px 0 rgba(255,255,255,0.4) inset;}
.mi-ref .menu-item-icon{background:linear-gradient(135deg,#5ba3e8,#2a72cc);box-shadow:0 3px 10px rgba(42,114,204,0.35),0 1px 0 rgba(255,255,255,0.4) inset;}
.mi-ex  .menu-item-icon{background:linear-gradient(135deg,#3dcb96,#0a8f60);box-shadow:0 3px 10px rgba(10,143,96,0.35),0 1px 0 rgba(255,255,255,0.4) inset;}
.menu-download{
  width:100%;margin-top:6px;padding:11px 14px;border-radius:13px;border:none;
  background:linear-gradient(150deg,#5ba3e8,#2a72cc);
  color:#fff;font-size:13.5px;font-weight:800;font-family:'Nunito',sans-serif;
  cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 14px rgba(42,114,204,0.35),0 1px 0 rgba(255,255,255,0.35) inset;
  position:relative;overflow:hidden;text-decoration:none;
}
.menu-download::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:13px 13px 0 0;}
.menu-download:hover{transform:translateY(-1px);}
.menu-download:active{transform:scale(.97);}
.menu-goto{width:100%;margin-top:6px;padding:11px 14px;border-radius:13px;border:none;color:#fff;font-size:13.5px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden;text-decoration:none;}
.menu-goto::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:13px 13px 0 0;}
.menu-goto:hover{transform:translateY(-1px);}
.menu-goto:active{transform:scale(.97);}
.menu-goto-geo{background:linear-gradient(150deg,#3dcb96,#0a8f60);box-shadow:0 4px 14px rgba(10,143,96,0.35),0 1px 0 rgba(255,255,255,0.35) inset;}
.menu-goto-eng{background:linear-gradient(150deg,#8e7ff0,#5a4bc4);box-shadow:0 4px 14px rgba(106,90,224,0.35),0 1px 0 rgba(255,255,255,0.35) inset;}
.menu-goto-fec{background:linear-gradient(150deg,#e74c3c,#9b59b6);box-shadow:0 4px 14px rgba(155,89,182,0.35),0 1px 0 rgba(255,255,255,0.35) inset;}

.menu-sep{height:1px;background:rgba(200,220,235,0.5);margin:6px 4px;}
.menu-download{
  width:100%;margin-top:6px;padding:11px 14px;border-radius:13px;border:none;
  background:linear-gradient(150deg,#5ba3e8,#2a72cc);
  color:#fff;font-size:13.5px;font-weight:800;font-family:'Nunito',sans-serif;
  cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 14px rgba(42,114,204,0.35),0 1px 0 rgba(255,255,255,0.35) inset;
  position:relative;overflow:hidden;text-decoration:none;
}
.menu-download::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:13px 13px 0 0;}
.menu-download:hover{transform:translateY(-1px);}
.menu-download:active{transform:scale(.97);}
.menu-goto{width:100%;margin-top:6px;padding:11px 14px;border-radius:13px;border:none;background:linear-gradient(150deg,#9b59b6,#8e44ad);color:#fff;font-size:13.5px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(142,68,173,0.35),0 1px 0 rgba(255,255,255,0.35) inset;position:relative;overflow:hidden;}
.menu-goto::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:13px 13px 0 0;}
.menu-goto:hover{transform:translateY(-1px);}
.menu-goto:active{transform:scale(.97);}

/* ══ PAGES ══ */
.page{display:none;flex-direction:column;flex:1;overflow:hidden;}
.page.active{display:flex;}
.scroll-area{flex:1;overflow-y:auto;padding:14px 16px 40px;-webkit-overflow-scrolling:touch;position:relative;z-index:10;}

/* ══ PAGE HEADER ══ */
.page-header{position:relative;z-index:10;padding:12px 16px 0;flex-shrink:0;text-align:center;}
.page-title-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.42);border:1px solid var(--glass-bdr);border-radius:18px;padding:8px 18px;backdrop-filter:blur(12px);box-shadow:0 4px 16px rgba(80,170,220,0.18),0 1px 0 rgba(255,255,255,0.9) inset;position:relative;overflow:hidden;}
.page-title-pill::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.5),transparent);pointer-events:none;border-radius:18px 18px 0 0;}
.page-title-pill h2{font-size:16px;font-weight:800;color:var(--text-dark);}
.page-subtitle{font-size:11px;color:var(--text-light);margin-top:5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.page-icon{width:24px;height:24px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.icon-lib{background:linear-gradient(135deg,#e74c3c,#c0392b);box-shadow:0 2px 6px rgba(192,57,43,0.4);}
.icon-nor{background:linear-gradient(135deg,#9b59b6,#8e44ad);box-shadow:0 2px 6px rgba(142,68,173,0.4);}
.icon-ref{background:linear-gradient(135deg,#5ba3e8,#2a72cc);box-shadow:0 2px 6px rgba(42,114,204,0.4);}
.icon-ex {background:linear-gradient(135deg,#3dcb96,#0a8f60);box-shadow:0 2px 6px rgba(10,143,96,0.4);}

/* ══ INNER NAV ══ */
.inner-nav{display:flex;gap:8px;padding:12px 16px 0;justify-content:center;flex-wrap:wrap;flex-shrink:0;position:relative;z-index:10;}
.nav-btn{padding:8px 20px;border-radius:50px;border:none;font-size:13.5px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;opacity:.38;text-shadow:0 1px 2px rgba(0,0,0,0.2);white-space:nowrap;}
.nav-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:52%;background:linear-gradient(to bottom,rgba(255,255,255,0.5),rgba(255,255,255,0.1));border-radius:50px 50px 0 0;pointer-events:none;}
.nav-btn.active{opacity:1;transform:translateY(-1px);}
.nav-btn:active{transform:scale(.96);}
.btn-lib{background:linear-gradient(150deg,#e74c3c,#c0392b);color:#fff;box-shadow:0 4px 14px rgba(192,57,43,0.5),0 1px 0 rgba(255,255,255,0.4) inset;}
.btn-nor{background:linear-gradient(150deg,#9b59b6,#8e44ad);color:#fff;box-shadow:0 4px 14px rgba(142,68,173,0.5),0 1px 0 rgba(255,255,255,0.4) inset;}

/* ══ GLASS CARD ══ */
.card{background:var(--glass-bg2);border:1px solid var(--glass-bdr);border-radius:22px;padding:1.35rem 1.25rem;backdrop-filter:blur(18px);box-shadow:0 8px 32px rgba(60,150,210,0.18),0 1.5px 0 rgba(255,255,255,0.9) inset;position:relative;overflow:hidden;animation:cardIn .25s cubic-bezier(.34,1.56,.64,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(8px) scale(.98);}to{opacity:1;transform:none;}}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:44%;background:linear-gradient(to bottom,rgba(255,255,255,0.42),rgba(255,255,255,0.06));border-radius:22px 22px 60% 60%/22px 22px 30px 30px;pointer-events:none;}

.meaning-label{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);margin-bottom:5px;}
.meaning-text{font-size:16.5px;font-weight:800;color:var(--text-dark);margin-bottom:1rem;line-height:1.45;}
.word-header{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;}
.word-title{font-size:26px;font-weight:800;color:var(--text-dark);letter-spacing:-.4px;text-shadow:0 2px 0 rgba(255,255,255,0.8);}
.word-count{font-size:12.5px;color:var(--text-light);font-weight:600;background:rgba(255,255,255,0.5);padding:2px 9px;border-radius:20px;border:1px solid rgba(255,255,255,0.7);}
.subtitle{font-size:12.5px;color:var(--text-light);font-weight:600;margin-bottom:12px;}

.progress{display:flex;gap:6px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(180,210,230,0.4);border:1px solid rgba(255,255,255,0.6);transition:background .25s,transform .25s;flex-shrink:0;}
.dot.active-dot{transform:scale(1.35);}

.sense-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.sense-tab{padding:6px 14px;border-radius:50px;font-size:12.5px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;background:rgba(255,255,255,0.38);border:1px solid rgba(255,255,255,0.75);color:var(--text-mid);backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(80,160,200,0.12),0 1px 0 rgba(255,255,255,0.8) inset;}
.sense-tab::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.55),transparent);border-radius:50px 50px 0 0;}
.sense-tab.active{color:#fff;border-color:rgba(255,255,255,0.4);box-shadow:0 3px 14px rgba(0,0,0,0.2),0 1px 0 rgba(255,255,255,0.4) inset;text-shadow:0 1px 2px rgba(0,0,0,0.25);}

.body-text{font-size:14px;color:var(--text-mid);line-height:1.7;font-weight:600;margin-bottom:1rem;}
.key-box{background:rgba(255,255,255,0.45);border-radius:14px;padding:13px 14px;border:1px solid rgba(255,255,255,0.75);box-shadow:0 2px 8px rgba(80,160,210,0.1),0 1px 0 rgba(255,255,255,0.8) inset;position:relative;overflow:hidden;margin-top:12px;}
.key-box::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:14px 14px 0 0;pointer-events:none;}
.key-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-light);margin-bottom:9px;}
.key-item{display:flex;align-items:flex-start;gap:9px;margin-bottom:8px;font-size:13.5px;font-weight:700;color:var(--text-dark);line-height:1.5;}
.key-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px;box-shadow:0 1px 4px rgba(0,0,0,0.15);}

.example-box{background:rgba(255,255,255,0.38);border-radius:14px;padding:11px 13px;border:1px solid rgba(255,255,255,0.7);margin-top:10px;position:relative;overflow:hidden;}
.example-box::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(to bottom,rgba(255,255,255,0.35),transparent);border-radius:14px 14px 0 0;}
.example-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-light);margin-bottom:7px;}
.example-item{font-size:13px;font-weight:600;color:var(--text-mid);padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.5);line-height:1.5;}
.example-item:last-child{border-bottom:none;}
.example-item::before{content:"→ ";color:var(--text-light);}

.note-box{margin-top:13px;padding:10px 13px;border-radius:0 14px 14px 0;font-size:12.5px;color:var(--text-mid);line-height:1.65;font-weight:600;background:rgba(255,255,255,0.38);border:1px solid rgba(255,255,255,0.65);border-left-width:4px;}

/* ══ REFERENCE TABLE ══ */
.ref-table{width:100%;border-collapse:separate;border-spacing:0 6px;}
.ref-table thead th{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-light);text-align:left;padding:5px 12px;}
.ref-row td{padding:11px 12px;background:rgba(255,255,255,0.45);border-top:1px solid rgba(255,255,255,0.75);border-bottom:1px solid rgba(255,255,255,0.45);font-size:13px;font-weight:700;color:var(--text-dark);}
.ref-row td:first-child{border-left:1px solid rgba(255,255,255,0.75);border-radius:12px 0 0 12px;}
.ref-row td:last-child{border-right:1px solid rgba(255,255,255,0.75);border-radius:0 12px 12px 0;color:var(--text-mid);font-size:12.5px;font-weight:600;}
.ref-row:hover td{background:rgba(255,255,255,0.65);}
.ref-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:800;border:1px solid rgba(255,255,255,0.6);}

/* ══ EXERCISE COMPONENTS ══ */
.ex-progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.ex-prog-label{font-size:12px;font-weight:700;color:var(--text-mid);}
.ex-prog-score{font-size:12px;font-weight:800;color:var(--text-dark);background:rgba(255,255,255,0.5);padding:2px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.7);}
.ex-track{height:10px;border-radius:10px;background:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.7);margin-bottom:14px;overflow:hidden;}
.ex-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#e74c3c,#9b59b6);transition:width .4s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;}
.ex-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.5),transparent);}

.type-badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.6);box-shadow:0 1px 4px rgba(0,0,0,0.08),0 1px 0 rgba(255,255,255,0.7) inset;position:relative;overflow:hidden;}
.type-badge::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:20px 20px 0 0;}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.badge-mc  {background:rgba(231,76,60,0.15); color:#8b1a10;border-color:rgba(231,76,60,0.4);}
.badge-fill{background:rgba(155,89,182,0.15);color:#5a1a8a;border-color:rgba(155,89,182,0.4);}
.badge-tf  {background:rgba(61,203,150,0.18);color:#0a5e40;border-color:rgba(61,203,150,0.4);}

.q-num{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;}
.q-text{font-size:16.5px;font-weight:800;color:var(--text-dark);line-height:1.5;margin-bottom:1.1rem;}

.opts{display:flex;flex-direction:column;gap:8px;}
.opt-btn{width:100%;text-align:left;padding:11px 16px;border-radius:14px;border:1px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.45);font-size:13.5px;font-weight:700;color:var(--text-dark);font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;box-shadow:0 2px 8px rgba(80,160,210,0.1),0 1px 0 rgba(255,255,255,0.8) inset;position:relative;overflow:hidden;}
.opt-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(to bottom,rgba(255,255,255,0.45),transparent);border-radius:14px 14px 0 0;}
.opt-btn:hover:not(:disabled){background:rgba(255,255,255,0.65);transform:translateY(-1px);}
.opt-btn:disabled{cursor:default;}
.opt-btn.correct{background:rgba(60,200,130,0.18);border-color:rgba(60,200,130,0.7);color:#0a6e40;}
.opt-btn.wrong  {background:rgba(220,80,50,0.14); border-color:rgba(220,80,50,0.6); color:#8b2010;}
.opt-btn.reveal {background:rgba(255,255,255,0.25);color:var(--text-light);opacity:.65;}

.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tf-btn{padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,0.7);font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;text-align:center;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;box-shadow:0 2px 10px rgba(80,160,210,0.12),0 1px 0 rgba(255,255,255,0.8) inset;}
.tf-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.45),transparent);border-radius:16px 16px 0 0;}
.tf-true {background:rgba(91,163,232,0.18);color:#1a5c99;}
.tf-false{background:rgba(240,112,64,0.15);color:#8b3010;}
.tf-btn:hover:not(:disabled){transform:translateY(-2px);}
.tf-btn:disabled{cursor:default;}
.tf-btn.correct{background:rgba(60,200,130,0.18);border-color:rgba(60,200,130,0.7);color:#0a6e40;}
.tf-btn.wrong  {background:rgba(220,80,50,0.14); border-color:rgba(220,80,50,0.6); color:#8b2010;}

.fill-row{display:flex;gap:8px;}
.fill-input{flex:1;padding:11px 14px;border-radius:14px;border:1px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.55);font-size:14px;font-weight:700;color:var(--text-dark);font-family:'Nunito',sans-serif;backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(80,160,210,0.1),0 1px 0 rgba(255,255,255,0.8) inset;outline:none;transition:all .15s;}
.fill-input:focus{border-color:rgba(155,89,182,0.7);box-shadow:0 0 0 3px rgba(155,89,182,0.15);}
.fill-input.correct{border-color:rgba(60,200,130,0.7);background:rgba(60,200,130,0.18);color:#0a6e40;}
.fill-input.wrong  {border-color:rgba(220,80,50,0.6); background:rgba(220,80,50,0.14); color:#8b2010;}
.fill-input:disabled{cursor:default;}
.check-btn{padding:11px 16px;border-radius:14px;border:none;background:linear-gradient(150deg,#9b59b6,#8e44ad);color:#fff;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(142,68,173,0.4),0 1px 0 rgba(255,255,255,0.35) inset;position:relative;overflow:hidden;white-space:nowrap;}
.check-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:14px 14px 0 0;}
.check-btn:hover{transform:translateY(-1px);}
.check-btn:disabled{opacity:.5;cursor:default;transform:none;}

.feedback{margin-top:11px;padding:10px 14px;border-radius:14px;font-size:13px;font-weight:700;line-height:1.6;border:1px solid;display:none;animation:fadeIn .2s ease;}
.feedback.show{display:block;}
.feedback.correct{background:rgba(60,200,130,0.18);border-color:rgba(60,200,130,0.7);color:#0a6e40;}
.feedback.wrong  {background:rgba(220,80,50,0.14); border-color:rgba(220,80,50,0.6); color:#8b2010;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

.next-btn{width:100%;margin-top:11px;padding:13px;border-radius:16px;border:none;background:linear-gradient(150deg,#e74c3c,#c0392b);color:#fff;font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;box-shadow:0 4px 16px rgba(192,57,43,0.4),0 1px 0 rgba(255,255,255,0.35) inset;display:none;position:relative;overflow:hidden;animation:fadeIn .25s ease;}
.next-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:16px 16px 0 0;}
.next-btn.show{display:block;}
.next-btn:hover{transform:translateY(-2px);}

.results{text-align:center;padding:1.5rem 1rem;animation:cardIn .35s cubic-bezier(.34,1.56,.64,1);}
.results-score{font-size:68px;font-weight:800;line-height:1;background:linear-gradient(135deg,#e74c3c,#9b59b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.results-label{font-size:15px;font-weight:700;color:var(--text-mid);margin-bottom:6px;}
.results-sub{font-size:13px;font-weight:600;color:var(--text-light);margin-bottom:1.4rem;}
.results-stars{font-size:30px;margin-bottom:1.1rem;letter-spacing:4px;}
.breakdown{display:flex;gap:10px;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap;}
.pill{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;border:1px solid rgba(255,255,255,0.7);box-shadow:0 2px 8px rgba(80,160,210,0.12),0 1px 0 rgba(255,255,255,0.8) inset;position:relative;overflow:hidden;}
.pill::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.45),transparent);border-radius:20px 20px 0 0;}
.pill-c{background:rgba(60,200,130,0.2);color:#0a6e40;}
.pill-w{background:rgba(220,80,50,0.15);color:#8b2010;}
.retry-btn{width:100%;padding:13px;border-radius:18px;border:none;background:linear-gradient(150deg,#e74c3c,#c0392b);color:#fff;font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;box-shadow:0 5px 18px rgba(192,57,43,0.45),0 1px 0 rgba(255,255,255,0.35) inset;position:relative;overflow:hidden;}
.retry-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);border-radius:18px 18px 0 0;}
.retry-btn:hover{transform:translateY(-2px);}

@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.05);}100%{transform:scale(1);}}
.shake{animation:shake .35s ease;}
.pop  {animation:pop   .25s ease;}

.menu-hero{text-align:center;padding:6px 4px 10px;position:relative;z-index:1;}
.menu-hero-logo{font-family:'Roboto Condensed',sans-serif;font-weight:500;font-size:32px;color:var(--text-dark);letter-spacing:0.5px;text-shadow:0 2px 8px rgba(80,160,210,0.2),0 1px 0 rgba(255,255,255,0.9);}
.menu-hero-logo span{background:linear-gradient(135deg,#8e7ff0,#5a4bc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.menu-hero-sub{font-size:11px;font-weight:600;color:var(--text-light);margin-top:2px;letter-spacing:.04em;}
.menu-subjects{display:flex;flex-direction:column;gap:7px;margin-bottom:2px;position:relative;z-index:1;}
.menu-subject{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:13px;border:1px solid rgba(255,255,255,0.7);font-size:13.5px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;text-decoration:none;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(80,160,210,0.12),0 1px 0 rgba(255,255,255,0.8) inset;}
.menu-subject::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.45),transparent);border-radius:13px 13px 0 0;}
.menu-subject:hover{transform:translateY(-1px);}
.menu-subject:active{transform:scale(.97);}
.ms-eng{background:rgba(142,127,240,0.15);color:#3a2ea0;border-color:rgba(142,127,240,0.4);}
.ms-geo{background:rgba(61,203,150,0.15);color:#0a5e40;border-color:rgba(61,203,150,0.4);}
.ms-fec{background:rgba(231,76,60,0.15);color:#8b1a10;border-color:rgba(231,76,60,0.4);}
.menu-goto-home{background:linear-gradient(150deg,#5ba3e8,#2a72cc);box-shadow:0 4px 14px rgba(42,114,204,0.35),0 1px 0 rgba(255,255,255,0.35) inset;}

html.in-iframe .master-topbar { display: none !important; }
html.in-iframe body { --topbar-h: 0px; }

/* WATER DROP on all buttons */
document.addEventListener('click', function(e){
  const btn = e.target.closest('button, .sense-tab, .nav-btn, .page-btn, .newara-logo, .opt-btn, .tf-btn, .check-btn, .next-btn, .retry-btn');
  if(!btn) return;
  if(btn.classList.contains('menu-goto')) return;
  if(btn.classList.contains('menu-download')) return;
  if(btn.classList.contains('menu-download')) return;
  playWater();
});

/* PAGE ROUTER */
const pages=['lib','nor','ref','ex'];
let exStarted=false;
function showPage(p){ notifyParent(p);
  pages.forEach(id=>document.getElementById('page-'+id).classList.toggle('active',id===p));
  document.querySelectorAll('.page-btn').forEach((b,i)=>b.classList.toggle('active',pages[i]===p));
  if(p==='ex'&&!exStarted){exStarted=true;exStartGame();}
  if(p==='ref') renderRef();
}
function toggleMenu(){ document.getElementById('menuOverlay').classList.toggle('open'); }
function closeMenu(e){ if(e.target===document.getElementById('menuOverlay')) document.getElementById('menuOverlay').classList.remove('open'); }
function menuGoTo(p){ document.getElementById('menuOverlay').classList.remove('open'); showPage(p); }

function exShuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
let exQs=[], exCur=0, exScore=0, exAnswered=false;

function exStartGame(){
  exQs=exShuffle(EX_BANK); exCur=0; exScore=0; exAnswered=false; exRenderQ();
}

function exRenderQ(){
  exAnswered=false;
  const app=document.getElementById('ex-app');
  const total=exQs.length, pct=Math.round((exCur/total)*100), q=exQs[exCur];
  let badgeHtml='', bodyHtml='';
  if(q.type==='mc'){
    badgeHtml=`<div class="type-badge badge-mc"><span class="badge-dot"></span>Opción múltiple · ${q.topic}</div>`;
    bodyHtml=`<div class="opts">${q.options.map((o,i)=>`<button class="opt-btn" id="exopt${i}" onclick="exAnswerMC(${i})">${o}</button>`).join('')}</div>`;
  } else if(q.type==='fill'){
    badgeHtml=`<div class="type-badge badge-fill"><span class="badge-dot"></span>Completar · ${q.topic}</div>`;
    bodyHtml=`<div class="fill-row"><input class="fill-input" id="exFill" type="text" placeholder="Tu respuesta…" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')exCheckFill()"><button class="check-btn" onclick="exCheckFill()">✓</button></div><p style="font-size:11.5px;color:var(--text-light);margin-top:6px;font-weight:600;">💡 ${q.hint}</p>`;
  } else if(q.type==='tf'){
    badgeHtml=`<div class="type-badge badge-tf"><span class="badge-dot"></span>V / F · ${q.topic}</div>`;
    bodyHtml=`<div class="tf-row"><button class="tf-btn tf-true" id="exTfT" onclick="exAnswerTF(true)">✓ Verdadero</button><button class="tf-btn tf-false" id="exTfF" onclick="exAnswerTF(false)">✗ Falso</button></div>`;
  }
  app.innerHTML=`
    <div class="ex-progress-row"><span class="ex-prog-label">Pregunta ${Math.min(exCur+1,total)} de ${total}</span><span class="ex-prog-score">✓ ${exScore}</span></div>
    <div class="ex-track"><div class="ex-fill" style="width:${pct}%"></div></div>
    ${badgeHtml}
    <div class="card">
      <div class="q-num">Pregunta ${exCur+1} de ${total}</div>
      <div class="q-text">${q.text}</div>
      ${bodyHtml}
      <div class="feedback" id="exFb"></div>
      <button class="next-btn" id="exNext" onclick="exNextQ()">${exCur===total-1?'Ver resultados →':'Siguiente →'}</button>
    </div>`;
  if(q.type==='fill') document.getElementById('exFill').focus();
}

function exShowFeedback(ok,exp){
  const fb=document.getElementById('exFb');
  fb.className=`feedback show ${ok?'correct':'wrong'}`;
  fb.innerHTML=(ok?'✓ ¡Correcto! ':'✗ Incorrecto. ')+exp;
  document.getElementById('exNext').classList.add('show');
  if(ok){exScore++;playGana();}else{playPerder();}
  exAnswered=true;
}

function exAnswerMC(idx){
  if(exAnswered)return;
  const q=exQs[exCur];
  const btns=document.querySelectorAll('#ex-app .opt-btn');
  btns.forEach(b=>b.disabled=true);
  btns[q.answer].classList.add('correct');
  if(idx!==q.answer){btns[idx].classList.add('wrong');}else{btns[idx].classList.add('pop');}
  btns.forEach((b,i)=>{if(i!==idx&&i!==q.answer)b.classList.add('reveal');});
  exShowFeedback(idx===q.answer, q.explanation);
}

function exCheckFill(){
  if(exAnswered)return;
  const input=document.getElementById('exFill');
  const val=input.value.trim();
  if(!val){input.classList.add('shake');setTimeout(()=>input.classList.remove('shake'),400);return;}
  const q=exQs[exCur];
  const ok=val.toLowerCase().replace(/[^a-záéíóúüñ\s]/gi,'').trim()===q.answer.toLowerCase();
  input.disabled=true;
  input.classList.add(ok?'correct':'wrong');
  if(!ok)input.value=`${val}  →  ${q.answer}`;
  if(ok)input.classList.add('pop'); else input.classList.add('shake');
  setTimeout(()=>input.classList.remove('shake','pop'),400);
  exShowFeedback(ok, q.explanation);
}

function exAnswerTF(ans){
  if(exAnswered)return;
  const q=exQs[exCur];
  const tBtn=document.getElementById('exTfT'), fBtn=document.getElementById('exTfF');
  tBtn.disabled=fBtn.disabled=true;
  const ok=ans===q.answer;
  const chosen=ans?tBtn:fBtn, right=q.answer?tBtn:fBtn;
  right.classList.add('correct');
  if(!ok){chosen.classList.add('wrong');chosen.classList.add('shake');}else chosen.classList.add('pop');
  setTimeout(()=>chosen.classList.remove('shake','pop'),400);
  exShowFeedback(ok, q.explanation);
}

function exNextQ(){
  exCur++;
  if(exCur>=exQs.length){exShowResults();return;}
  exRenderQ();
  document.querySelector('#page-ex .scroll-area').scrollTo({top:0,behavior:'smooth'});
}

function exShowResults(){
  const total=exQs.length, pct=Math.round((exScore/total)*100);
  const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  const msg=pct>=90?'¡Excelente!':pct>=70?'¡Muy bien!':pct>=50?'¡Vas bien!':'¡Sigue repasando!';
  document.getElementById('ex-app').innerHTML=`
    <div class="card results">
      <div class="results-stars">${stars}</div>
      <div class="results-score">${pct}%</div>
      <div class="results-label">${msg}</div>
      <div class="results-sub">${exScore} de ${total} respuestas correctas</div>
      <div class="breakdown">
        <div class="pill pill-c">✓ ${exScore} correctas</div>
        <div class="pill pill-w">✗ ${total-exScore} incorrectas</div>
      </div>
      <button class="retry-btn" onclick="exStartGame()">↺ Intentar de nuevo</button>
    </div>`;
}
