<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NewAra">
<title>NewAra</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌟</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Roboto+Condensed:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sky-top:#9ed4f0;--sky-mid:#bde4f5;--sky-bot:#e2f4fd;
  --glass-bg:rgba(255,255,255,0.38);--glass-bg2:rgba(255,255,255,0.55);--glass-bdr:rgba(255,255,255,0.78);
  --text-dark:#1a3a4a;--text-mid:#2e6080;--text-light:#5b9ab8;
}
html,body{height:100%;overflow:hidden;overscroll-behavior:none;}
body{
  font-family:'Nunito',sans-serif;display:flex;flex-direction:column;
  background:radial-gradient(ellipse at 15% 0%,rgba(160,220,255,0.75) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 5%,rgba(180,235,255,0.55) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 100%,rgba(100,195,240,0.45) 0%,transparent 60%),
    linear-gradient(175deg,var(--sky-top) 0%,var(--sky-mid) 40%,var(--sky-bot) 100%);
  background-attachment:fixed;
  padding-top:env(safe-area-inset-top);
}
body::before,body::after{content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
body::before{width:360px;height:360px;top:-90px;right:-90px;background:radial-gradient(circle,rgba(160,225,255,0.6) 0%,transparent 70%);}
body::after{width:300px;height:300px;bottom:-70px;left:-70px;background:radial-gradient(circle,rgba(130,205,250,0.5) 0%,transparent 70%);}

/* BUBBLES */
.bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.7),rgba(170,225,255,0.1));border:1px solid rgba(255,255,255,0.6);animation:floatUp linear infinite;}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:0;}10%{opacity:1;}90%{opacity:.5;}100%{transform:translateY(-110vh) scale(1.1);opacity:0;}}

/* TOPBAR */
.topbar{position:relative;z-index:100;flex-shrink:0;background:rgba(255,255,255,0.35);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.75);box-shadow:0 2px 16px rgba(80,170,220,0.15),0 1px 0 rgba(255,255,255,0.9) inset;}
.topbar::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.45),transparent);pointer-events:none;}
.topbar-row1{height:54px;display:flex;align-items:center;padding:0 14px;gap:10px;position:relative;z-index:1;}
.topbar-row2{display:flex;align-items:center;padding:0 10px 7px;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:relative;z-index:1;}
.topbar-row2::-webkit-scrollbar{display:none;}
.topbar-row2.hidden{display:none;}

/* LOGO */
.newara-logo{font-family:'Roboto Condensed',sans-serif;font-weight:500;font-size:21px;flex-shrink:0;color:var(--text-dark);letter-spacing:0.5px;cursor:pointer;padding:4px 8px;border-radius:10px;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none;border:none;background:none;}
.newara-logo:hover{background:rgba(255,255,255,0.4);}
.newara-logo:active{transform:scale(.95);}
.newara-logo span{background:linear-gradient(135deg,#8e7ff0,#5a4bc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar-divider{width:1px;height:26px;background:rgba(255,255,255,0.6);border-left:1px solid rgba(80,160,200,0.2);flex-shrink:0;}

/* SUBJECT BUTTONS */
.subj-btn{padding:6px 13px;border-radius:50px;border:1px solid rgba(255,255,255,0.7);font-size:12.5px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;white-space:nowrap;flex-shrink:0;position:relative;overflow:hidden;opacity:.42;background:rgba(255,255,255,0.45);color:var(--text-mid);box-shadow:0 2px 6px rgba(80,160,210,0.1),0 1px 0 rgba(255,255,255,0.8) inset;}
.subj-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:52%;background:linear-gradient(to bottom,rgba(255,255,255,0.5),rgba(255,255,255,0.1));border-radius:50px 50px 0 0;pointer-events:none;}
.subj-btn.active{opacity:1;transform:translateY(-1px);color:#fff;border-color:rgba(255,255,255,0.4);}
.subj-btn:active{transform:scale(.95);}
.sb-home.active{background:linear-gradient(150deg,#5ba3e8,#2a72cc);box-shadow:0 4px 14px rgba(42,114,204,0.45),0 1px 0 rgba(255,255,255,0.35) inset;text-shadow:0 1px 2px rgba(0,0,0,0.2);}
.sb-eng.active{background:linear-gradient(150deg,#8e7ff0,#5a4bc4);box-shadow:0 4px 14px rgba(106,90,224,0.45),0 1px 0 rgba(255,255,255,0.35) inset;text-shadow:0 1px 2px rgba(0,0,0,0.2);}
.sb-geo.active{background:linear-gradient(150deg,#3dcb96,#0a8f60);box-shadow:0 4px 14px rgba(10,143,96,0.45),0 1px 0 rgba(255,255,255,0.35) inset;text-shadow:0 1px 2px rgba(0,0,0,0.2);}
.sb-fec.active{background:linear-gradient(150deg,#e74c3c,#9b59b6);box-shadow:0 4px 14px rgba(155,89,182,0.45),0 1px 0 rgba(255,255,255,0.35) inset;text-shadow:0 1px 2px rgba(0,0,0,0.2);}

/* MENU */
.menu-overlay{position:fixed;inset:0;z-index:200;display:none;align-items:flex-start;justify-content:flex-start;padding-top:62px;padding-left:14px;background:rgba(160,210,240,0.18);backdrop-filter:blur(6px);animation:menuFadeIn .18s ease;}
.menu-overlay.open{display:flex;}
@keyframes menuFadeIn{from{opacity:0;}to{opacity:1;}}
.menu-panel{background:rgba(255,255,255,0.72);border:1px solid rgba(255,255,255,0.9);border-radius:20px;padding:10px;min-width:220px;backdrop-filter:blur(24px);box-shadow:0 12px 40px rgba(60,140,210,0.22),0 1.5px 0 rgba(255,255,255,0.95) inset;position:relative;overflow:hidden;animation:menuSlideIn .2s cubic-bezier(.34,1.56,.64,1);}
@keyframes menuSlideIn{from{opacity:0;transform:translateY(-8px) scale(.97);}to{opacity:1;transform:none;}}
.menu-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(to bottom,rgba(255,255,255,0.55),transparent);pointer-events:none;border-radius:20px 20px 0 0;}
.menu-hero{text-align:center;padding:6px 4px 10px;position:relative;z-index:1;}
.menu-hero-logo{font-family:'Roboto Condensed',sans-serif;font-weight:500;font-size:30px;color:var(--text-dark);}
.menu-hero-logo span{background:linear-gradient(135deg,#8e7ff0,#5a4bc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.menu-hero-sub{font-size:11px;font-weight:600;color:var(--text-light);margin-top:2px;letter-spacing:.04em;}
.menu-sep{height:1px;background:rgba(200,220,235,0.5);margin:6px 4px;}
.menu-subj-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 14px;border-radius:13px;border:1px solid rgba(255,255,255,0.7);font-size:13.5px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;margin-bottom:6px;box-shadow:0 2px 8px rgba(80,160,210,0.1),0 1px 0 rgba(255,255,255,0.8) inset;}
.menu-subj-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.45),transparent);border-radius:13px 13px 0 0;}
.menu-subj-btn:hover{transform:translateY(-1px);}
.menu-subj-btn:active{transform:scale(.97);}
.msb-eng{background:rgba(142,127,240,0.15);color:#3a2ea0;border-color:rgba(142,127,240,0.4);}
.msb-geo{background:rgba(61,203,150,0.15);color:#0a5e40;border-color:rgba(61,203,150,0.4);}
.msb-fec{background:rgba(231,76,60,0.15);color:#8b1a10;border-color:rgba(231,76,60,0.4);}
.msb-home{background:rgba(91,163,232,0.15);color:#1a5c99;border-color:rgba(91,163,232,0.4);}

/* HOME PAGE */
#home-page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px 60px;overflow-y:auto;position:relative;z-index:10;}
#home-page.hidden{display:none;}
.home-logo{font-family:'Roboto Condensed',sans-serif;font-weight:500;font-size:68px;color:var(--text-dark);letter-spacing:-1px;text-shadow:0 4px 16px rgba(80,160,210,0.25),0 2px 0 rgba(255,255,255,0.9);line-height:1;margin-bottom:8px;text-align:center;}
.home-logo span{background:linear-gradient(135deg,#8e7ff0,#5a4bc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.home-sub{font-size:14px;font-weight:600;color:var(--text-light);letter-spacing:.06em;margin-bottom:36px;text-align:center;}
.home-cards{width:100%;max-width:420px;display:flex;flex-direction:column;gap:14px;}
.home-card{width:100%;background:var(--glass-bg2);border:1px solid var(--glass-bdr);border-radius:24px;backdrop-filter:blur(18px);box-shadow:0 8px 32px rgba(60,150,210,0.18),0 1.5px 0 rgba(255,255,255,0.9) inset;position:relative;overflow:hidden;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);font-family:'Nunito',sans-serif;text-align:left;border:none;}
.home-card::before{content:'';position:absolute;top:0;left:0;right:0;height:44%;background:linear-gradient(to bottom,rgba(255,255,255,0.42),rgba(255,255,255,0.06));border-radius:24px 24px 60% 60%/24px 24px 30px 30px;pointer-events:none;}
.home-card:hover{transform:translateY(-3px);}
.home-card:active{transform:scale(.97);}
.home-card-inner{display:flex;align-items:center;gap:16px;padding:18px 20px;}
.home-card-icon{width:52px;height:52px;border-radius:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;border:1px solid rgba(255,255,255,0.6);box-shadow:0 4px 14px rgba(0,0,0,0.15),0 1px 0 rgba(255,255,255,0.8) inset;position:relative;overflow:hidden;}
.home-card-icon::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.5),transparent);border-radius:16px 16px 0 0;}
.hci-eng{background:linear-gradient(135deg,#8e7ff0,#5a4bc4);}
.hci-geo{background:linear-gradient(135deg,#3dcb96,#0a8f60);}
.hci-fec{background:linear-gradient(135deg,#e74c3c,#9b59b6);}
.home-card-title{font-size:19px;font-weight:800;color:var(--text-dark);text-shadow:0 1px 0 rgba(255,255,255,0.8);margin-bottom:3px;}
.home-card-sub{font-size:12px;font-weight:600;color:var(--text-light);line-height:1.4;}
.home-card-arrow{font-size:22px;color:var(--text-light);flex-shrink:0;transition:transform .2s;}
.home-card:hover .home-card-arrow{transform:translateX(4px);}

/* IFRAME */
#iframe-wrap{flex:1;display:none;overflow:hidden;position:relative;z-index:10;}
#iframe-wrap.active{display:block;}
#subject-frame{width:100%;height:100%;border:none;display:block;}
</style>
</head>
<body>

<div class="bubbles" id="bubbles"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-row1">
    <button class="newara-logo" onclick="toggleMenu()">New<span>Ara</span></button>
    <div class="topbar-divider"></div>
    <div style="display:flex;gap:6px;flex:1;overflow-x:auto;scrollbar-width:none;">
      <button class="subj-btn sb-home active" onclick="goHome()">🏠 Inicio</button>
      <button class="subj-btn sb-eng" onclick="loadSubject('eng','english.html')">📚 English</button>
      <button class="subj-btn sb-geo" onclick="loadSubject('geo','geo.html')">🌍 Geo</button>
      <button class="subj-btn sb-fec" onclick="loadSubject('fec','fec.html')">⚖️ FEC</button>
    </div>
  </div>
</div>

<!-- MENU -->
<div class="menu-overlay" id="menuOverlay" onclick="closeMenu(event)">
  <div class="menu-panel">
    <div class="menu-hero">
      <div class="menu-hero-logo">New<span>Ara</span></div>
      <div class="menu-hero-sub">Hecho por Newen</div>
    </div>
    <div class="menu-sep"></div>
    <button class="menu-subj-btn msb-eng" onclick="loadSubject('eng','english.html')">📚 NewAraEnglish</button>
    <button class="menu-subj-btn msb-geo" onclick="loadSubject('geo','geo.html')">🌍 NewAraGeo</button>
    <button class="menu-subj-btn msb-fec" onclick="loadSubject('fec','fec.html')">⚖️ NewAraFEC</button>
    <div class="menu-sep"></div>
    <button class="menu-subj-btn msb-home" onclick="goHome()">🏠 Página principal</button>
  </div>
</div>

<!-- HOME -->
<div id="home-page">
  <div class="home-logo">New<span>Ara</span></div>
  <div class="home-sub">Hecho por Newen</div>
  <div class="home-cards">
    <button class="home-card" onclick="loadSubject('eng','english.html')">
      <div class="home-card-inner">
        <div class="home-card-icon hci-eng">📚</div>
        <div style="flex:1;"><div class="home-card-title">NewAraEnglish</div>
        <div class="home-card-sub">So/Either/Neither · Tag Questions · Irregular Verbs</div></div>
        <div class="home-card-arrow">›</div>
      </div>
    </button>
    <button class="home-card" onclick="loadSubject('geo','geo.html')">
      <div class="home-card-inner">
        <div class="home-card-icon hci-geo">🌍</div>
        <div style="flex:1;"><div class="home-card-title">NewAraGeo</div>
        <div class="home-card-sub">La Geografía · La Esfera · Ejercicios</div></div>
        <div class="home-card-arrow">›</div>
      </div>
    </button>
    <button class="home-card" onclick="loadSubject('fec','fec.html')">
      <div class="home-card-inner">
        <div class="home-card-icon hci-fec">⚖️</div>
        <div style="flex:1;"><div class="home-card-title">NewAraFEC</div>
        <div class="home-card-sub">La Libertad · Las Normas · Tabla · Ejercicios</div></div>
        <div class="home-card-arrow">›</div>
      </div>
    </button>
  </div>
</div>

<!-- IFRAME -->
<div id="iframe-wrap">
  <iframe id="subject-frame" src="" title="Materia" allow="autoplay"></iframe>
</div>

    w.appendChild(b);

function playWater(){ try{SND_WATER.currentTime=0;SND_WATER.play();}catch(e){} }
document.addEventListener('click',function(e){
  const b=e.target.closest('button,.home-card,.newara-logo');
  if(b) playWater();
});

let curSubj = null;

function loadSubject(subj, file) {
  closeMenuDirect();
  curSubj = subj;

  // Show iframe, hide home
  document.getElementById('home-page').classList.add('hidden');
  document.getElementById('iframe-wrap').classList.add('active');

  // Load file in iframe
  const frame = document.getElementById('subject-frame');
  if(frame.dataset.loaded !== file) {
    frame.src = file;
    frame.dataset.loaded = file;
  }

  // Update subject buttons
  document.querySelectorAll('.subj-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.sb-'+subj).classList.add('active');
}

function goHome() {
  closeMenuDirect();
  curSubj = null;
  document.getElementById('home-page').classList.remove('hidden');
  document.getElementById('iframe-wrap').classList.remove('active');
  document.getElementById('subject-frame').src = '';
  document.getElementById('subject-frame').dataset.loaded = '';
  document.querySelectorAll('.subj-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.sb-home').classList.add('active');
}

function toggleMenu(){ document.getElementById('menuOverlay').classList.toggle('open'); }
function closeMenu(e){ if(e.target===document.getElementById('menuOverlay')) closeMenuDirect(); }
function closeMenuDirect(){ document.getElementById('menuOverlay').classList.remove('open'); }
</script>
